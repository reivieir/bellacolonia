<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do Financiamento</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --pending: #d1d5db;
            --danger: #ef4444;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            max-width: 650px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: var(--primary);
        }

        .timeline {
            position: relative;
            margin-left: 15px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 14px;
            width: 2px;
            background: var(--pending);
            z-index: 1;
        }

        .step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .step-marker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: white;
            border: 2px solid var(--pending);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #64748b;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .step-content {
            padding-top: 5px;
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: white;
        }

        .step-text {
            padding-right: 10px;
            flex-grow: 1;
        }

        .step-title {
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .step-desc {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 4px;
        }

        .step-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 2px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .icon-btn:hover {
            opacity: 1;
        }

        .step-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success);
        }

        /* Status Concluído */
        .step.completed .step-marker {
            background-color: var(--success);
            border-color: var(--success);
            color: white;
        }
        .step.completed .step-title {
            color: #64748b;
            text-decoration: line-through;
        }

        /* Status Ativo */
        .step.active .step-marker {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }
        .step.active .step-title {
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .step.pending .step-marker {
            background-color: white;
        }

        /* Painel de Adição */
        .admin-panel {
            margin-top: 40px;
            padding: 20px;
            background-color: #f1f5f9;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .admin-panel h3 {
            margin-top: 0;
            font-size: 1rem;
            color: #334155;
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .form-group input {
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .input-id { width: 60px; }
        .input-title { flex-grow: 1; }
        .input-desc { width: 100%; margin-bottom: 10px; }

        .btn-add {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add:hover { background-color: #1d4ed8; }

        .alert-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #fffbeb;
            border-left: 4px solid #f59e0b;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #92400e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Progresso do Financiamento 🏠</h1>
        
        <div class="timeline" id="timeline-container">
            </div>

        <div class="admin-panel">
            <h3>➕ Adicionar Nova Etapa</h3>
            <div class="form-group">
                <input type="text" id="new-id" class="input-id" placeholder="Nº (Ex: 8)">
                <input type="text" id="new-title" class="input-title" placeholder="Nome da etapa">
            </div>
            <input type="text" id="new-desc" class="input-desc" placeholder="Descrição ou observação (opcional)">
            <button class="btn-add" onclick="addNewStep()">Adicionar</button>
            <button class="btn-add" style="background-color: #64748b; margin-left: 10px;" onclick="resetProgress()">Restaurar Original</button>
        </div>

        <div class="alert-box">
            <h3>⚠️ Observações Importantes</h3>
            <p><strong>IQ com a CAIXA:</strong> Para dar entrada no cartório, é aguardar os vendedores receberem a Carta de Quitação (até 30 dias).</p>
        </div>
    </div>

    <script>
        const defaultSteps = [
            { id: "1", title: "Simulação", status: "completed" },
            { id: "2", title: "Aprovação de crédito", status: "completed" },
            { id: "3", title: "Envio de pasta", status: "active", desc: "ESTAMOS NESTA FASE" },
            { id: "4", title: "Vistoria do imóvel", status: "pending" },
            { id: "5", title: "Certificação assinatura digital E-notariado", status: "pending" },
            { id: "6", title: "Análise jurídica", status: "pending" },
            { id: "7", title: "Minuta, confirmação de dados e valores", status: "pending" },
            { id: "9", title: "Emissão do contrato", status: "pending", desc: "Débito da tarifa de vistoria: R$ 1.950,00" },
            { id: "10", title: "Assinatura de contrato", status: "pending", desc: "Digital e/ou física" },
            { id: "11", title: "Emissão e pagamento da guia de ITBI", status: "pending" },
            { id: "19", title: "Ingresso no cartório", status: "pending", desc: "Via RI DIGITAL (Itaú)" },
            { id: "20", title: "Pagamento da prenotação do cartório", status: "pending" },
            { id: "21", title: "Pagamento do registro no Cartório", status: "pending" },
            { id: "22", title: "Documento: Contrato Registrado", status: "pending" },
            { id: "23", title: "Pagamento ao vendedor", status: "pending", desc: "Recursos de financiamento" }
        ];

        let steps = [];

        function loadSteps() {
            const saved = localStorage.getItem('financiamentoSteps');
            if (saved) {
                steps = JSON.parse(saved);
            } else {
                steps = JSON.parse(JSON.stringify(defaultSteps));
            }
        }

        function saveSteps() {
            localStorage.setItem('financiamentoSteps', JSON.stringify(steps));
        }

        function updateStepsLogic() {
            let foundActive = false;
            for (let i = 0; i < steps.length; i++) {
                if (steps[i].status === 'completed') continue;
                if (!foundActive) {
                    steps[i].status = 'active';
                    foundActive = true;
                } else {
                    steps[i].status = 'pending';
                }
            }
        }

        function toggleStep(index, isChecked) {
            steps[index].status = isChecked ? 'completed' : 'pending';
            updateStepsLogic();
            saveSteps();
            renderSteps();
        }

        function deleteStep(index) {
            if(confirm(`Tem certeza que deseja excluir a etapa "${steps[index].title}"?`)) {
                steps.splice(index, 1);
                updateStepsLogic();
                saveSteps();
                renderSteps();
            }
        }

        function editStep(index) {
            const step = steps[index];
            const newTitle = prompt("Edite o nome da etapa:", step.title);
            if (newTitle === null) return; // Cancelou
            
            const newDesc = prompt("Edite a descrição (deixe em branco para remover):", step.desc || "");
            if (newDesc === null) return; // Cancelou

            step.title = newTitle.trim() || step.title;
            step.desc = newDesc.trim();
            if (step.desc === "") delete step.desc;

            saveSteps();
            renderSteps();
        }

        function addNewStep() {
            const idInput = document.getElementById('new-id');
            const titleInput = document.getElementById('new-title');
            const descInput = document.getElementById('new-desc');

            if(!idInput.value || !titleInput.value) {
                alert("Por favor, preencha pelo menos o Número e o Nome da etapa.");
                return;
            }

            const newStep = {
                id: idInput.value,
                title: titleInput.value,
                desc: descInput.value || undefined,
                status: "pending" // Novas etapas entram como pendentes
            };

            steps.push(newStep);
            
            // Opcional: Ordenar pelo ID numérico
            steps.sort((a, b) => parseInt(a.id) - parseInt(b.id));

            idInput.value = '';
            titleInput.value = '';
            descInput.value = '';

            updateStepsLogic();
            saveSteps();
            renderSteps();
        }

        function resetProgress() {
            if(confirm("Isso vai apagar todas as suas edições e voltar ao formato original. Continuar?")) {
                localStorage.removeItem('financiamentoSteps');
                loadSteps();
                updateStepsLogic();
                renderSteps();
            }
        }

        function renderSteps() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = ''; 

            steps.forEach((step, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = `step ${step.status}`;

                const marker = document.createElement('div');
                marker.className = 'step-marker';
                marker.innerHTML = step.status === 'completed' ? '✓' : step.id;

                const content = document.createElement('div');
                content.className = 'step-content';

                const textDiv = document.createElement('div');
                textDiv.className = 'step-text';

                const title = document.createElement('label');
                title.className = 'step-title';
                title.innerText = `${step.id}. ${step.title}`;
                title.htmlFor = `chk-${index}`; 

                textDiv.appendChild(title);

                if (step.desc) {
                    const desc = document.createElement('div');
                    desc.className = 'step-desc';
                    desc.innerText = step.desc;
                    textDiv.appendChild(desc);
                }

                // Ações (Editar, Excluir, Checkbox)
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'step-actions';

                const btnEdit = document.createElement('button');
                btnEdit.className = 'icon-btn';
                btnEdit.innerHTML = '✏️';
                btnEdit.title = "Editar etapa";
                btnEdit.onclick = () => editStep(index);

                const btnDelete = document.createElement('button');
                btnDelete.className = 'icon-btn';
                btnDelete.innerHTML = '🗑️';
                btnDelete.title = "Excluir etapa";
                btnDelete.onclick = () => deleteStep(index);

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'step-checkbox';
                checkbox.id = `chk-${index}`;
                checkbox.checked = step.status === 'completed';
                checkbox.addEventListener('change', (e) => toggleStep(index, e.target.checked));

                actionsDiv.appendChild(btnEdit);
                actionsDiv.appendChild(btnDelete);
                actionsDiv.appendChild(checkbox);

                content.appendChild(textDiv);
                content.appendChild(actionsDiv);

                stepDiv.appendChild(marker);
                stepDiv.appendChild(content);
                container.appendChild(stepDiv);
            });
        }

        // Inicialização
        loadSteps();
        updateStepsLogic();
        renderSteps();
    </script>
</body>
</html>
