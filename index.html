<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do Financiamento</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>Progresso do Financiamento 🏠</h1>
        
        <div class="timeline" id="timeline-container">
            <p style="text-align: center; color: #64748b;">Carregando dados do banco...</p>
        </div>

        <div class="admin-panel">
            <h3>➕ Adicionar Nova Etapa</h3>
            <div class="form-group">
                <input type="number" id="new-num" class="input-id" placeholder="Nº (Ex: 8)">
                <input type="text" id="new-title" class="input-title" placeholder="Nome da etapa">
            </div>
            <input type="text" id="new-desc" class="input-desc" placeholder="Descrição ou observação (opcional)">
            <button id="btn-add-step" class="btn-add">Adicionar</button>
        </div>

        
    </div>
    
    <script src="main.js"></script>
</body>
</html>
