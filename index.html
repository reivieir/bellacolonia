<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso do Financiamento Profissional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="main-wrapper">
        <header>
            <h1>Progresso do Financiamento 🏠</h1>
        </header>

        <main>
            <div class="timeline-wave" id="timeline-wave-container">
                <p style="text-align: center; color: #64748b;">Carregando dados...</p>
            </div>

            <div class="details-grid" id="details-grid-container">
                </div>
        </main>

        <footer>
             <div class="admin-panel">
                <h3>➕ Adicionar Nova Etapa</h3>
                <div class="form-group">
                    <select id="new-stage" class="input-stage">
                        <option value="start">Iniciação</option>
                        <option value="planning">Planejamento</option>
                        <option value="execution">Execução</option>
                        <option value="monitoring">Monitoramento</option>
                        <option value="closing">Encerramento</option>
                    </select>

                    <input type="text" id="new-title" class="input-title" placeholder="Nome da etapa">
                </div>
                <input type="text" id="new-desc" class="input-desc" placeholder="Descrição ou observação (opcional)">
                <button id="btn-add-step" class="btn-add">Adicionar</button>
            </div>
        </footer>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
